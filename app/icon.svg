<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="10%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#c48cfa"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <radialGradient id="sheen" cx="32%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#sheen)"/>
  <!-- orbit 1 -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- orbit 2 rotated 60deg -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="4.5" transform="rotate(60 50 50)"/>
  <!-- orbit 3 rotated 120deg -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="4.5" transform="rotate(120 50 50)"/>
  <!-- nucleus -->
  <circle cx="50" cy="50" r="8.5" fill="none" stroke="white" stroke-width="3.5"/>
  <circle cx="50" cy="50" r="3.5" fill="white"/>
</svg>
