<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#581c87"/>
  <!-- nucleus -->
  <circle cx="50" cy="50" r="5" fill="white"/>
  <!-- orbit 1 -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <!-- orbit 2 rotated 60deg -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="3" opacity="0.9" transform="rotate(60 50 50)"/>
  <!-- orbit 3 rotated 120deg -->
  <ellipse cx="50" cy="50" rx="38" ry="15" fill="none" stroke="white" stroke-width="3" opacity="0.9" transform="rotate(120 50 50)"/>
</svg>
